name: CI/CD — CosmicDeploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/cosmicdeploy

jobs:
  # ─────────────────────────────────────────────
  # Job 1 — Unit Tests
  # ─────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  # ─────────────────────────────────────────────
  # Job 2 — E2E Tests
  # ─────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run E2E tests
        run: npm run test:e2e

  # ─────────────────────────────────────────────
  # Job 3 — Build & Push Docker Hub
  # Uniquement si Job 1 ET Job 2 sont OK
  # ─────────────────────────────────────────────
  build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # Job 4 — Deploy sur VM Azure
  # Étape 1 : SFTP — upload docker-compose.yml
  # Étape 2 : SSH  — pull image + redémarrage idempotent + healthcheck
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Azure VM
    runs-on: ubuntu-latest
    needs: [build-push]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      # Injecter le tag SHA dans le docker-compose avant upload
      - name: Prepare docker-compose for deployment
        run: |
          sed "s|cosmicdeploy:latest|${{ env.IMAGE_NAME }}:${{ github.sha }}|g" \
            docker-compose.yml > docker-compose.deploy.yml

      # SFTP — upload du docker-compose sur la VM
      - name: Upload docker-compose via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_SSH_PRIVATE_KEY }}
          source: docker-compose.deploy.yml
          target: /home/${{ secrets.AZURE_VM_USER }}/cosmicdeploy/
          strip_components: 0

      # SSH — pull + redémarrage idempotent + healthcheck
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_SSH_PRIVATE_KEY }}
          script: |
            cd /home/${{ secrets.AZURE_VM_USER }}/cosmicdeploy

            # Login Docker Hub pour pull l'image privée si besoin
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | \
              docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            # Pull la nouvelle image
            docker pull ${{ env.IMAGE_NAME }}:${{ github.sha }}

            # Redémarrage idempotent via docker compose
            DOCKER_IMAGE=${{ env.IMAGE_NAME }}:${{ github.sha }} \
              docker compose -f docker-compose.deploy.yml up -d --remove-orphans

            # Attendre que le conteneur soit healthy
            sleep 5

            # Vérification finale — échoue la pipeline si KO
            curl -sf http://localhost:3000/health \
              && echo "Healthcheck OK" \
              || (echo "Healthcheck FAILED" && exit 1)
