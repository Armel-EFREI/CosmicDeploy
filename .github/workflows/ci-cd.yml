name: CI/CD — CosmicDeploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/cosmicdeploy
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────
  # Job 1 — Unit Tests
  # ─────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  # ─────────────────────────────────────────────
  # Job 2 — E2E Tests
  # ─────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run E2E tests
        run: npm run test:e2e

  # ─────────────────────────────────────────────
  # Job 3 — Build & Push Docker Hub
  # Uniquement si Job 1 ET Job 2 sont OK
  # ─────────────────────────────────────────────
  build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: myapp
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # Job 4 — Deploy sur VM Azure (SSH) + Mise à jour Kubernetes
  # Étape 5 du TP : SSH sur la VM
  # Étape 6 du TP : kubectl apply / set image sur le cluster K3s local
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes on Azure VM
    runs-on: ubuntu-latest
    needs: [build-push]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: myapp
    steps:
      - uses: actions/checkout@v4

      # ── Injecter le tag SHA dans le manifest K8s ──
      - name: Prepare k8s manifests for deployment
        run: |
          sed -i "s|image: cosmicdeploy:latest|image: ${{ env.IMAGE_NAME }}:${{ github.sha }}|g" \
            k8s/deployment.yaml
          echo "─── deployment.yaml (image line) ───"
          grep "image:" k8s/deployment.yaml

      # ── SFTP : upload des manifests K8s sur la VM ──
      - name: Upload k8s manifests via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          password: ${{ secrets.AZURE_VM_PASSWORD }}
          source: k8s/*
          target: /home/${{ secrets.AZURE_VM_USER }}/cosmicdeploy/k8s/
          strip_components: 1

      # ── SSH : kubectl apply + rollout + healthcheck ──
      - name: Update Kubernetes via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          password: ${{ secrets.AZURE_VM_PASSWORD }}
          script: |
            set -e
            cd /home/${{ secrets.AZURE_VM_USER }}/cosmicdeploy

            # Kubeconfig K3s (fichier protégé, rendu lisible par azureuser)
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
            sudo chmod 644 /etc/rancher/k3s/k3s.yaml || true

            # ── Secret Docker Registry (idempotent) ──
            # Permet au cluster K3s de pull depuis Docker Hub
            kubectl create secret docker-registry regcred \
              --docker-server=https://index.docker.io/v1/ \
              --docker-username="${{ secrets.DOCKERHUB_USERNAME }}" \
              --docker-password="${{ secrets.DOCKERHUB_TOKEN }}" \
              --dry-run=client -o yaml | kubectl apply -f -

            # ── Apply Deployment + Service ──
            # Fichiers explicites (kustomization.yaml n'est pas applicable via -f)
            kubectl apply -f k8s/deployment.yaml -f k8s/service.yaml

            # ── Force le nouveau tag SHA (si apply n'a pas détecté de diff) ──
            kubectl set image deployment/cosmicdeploy \
              cosmicdeploy=${{ env.IMAGE_NAME }}:${{ github.sha }}

            # ── Attendre la fin du rollout (échoue si crash) ──
            kubectl rollout status deployment/cosmicdeploy --timeout=180s

            # ── Healthcheck final via le NodePort ──
            sleep 5
            curl -sf http://localhost:30080/health \
              && echo "Kubernetes healthcheck OK" \
              || (echo "Kubernetes healthcheck FAILED" && kubectl describe deployment/cosmicdeploy && kubectl logs -l app=cosmicdeploy --tail=50 && exit 1)
