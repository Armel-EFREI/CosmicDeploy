apiVersion: apps/v1
kind: Deployment
metadata:
  name: cosmicdeploy
  labels:
    app: cosmicdeploy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cosmicdeploy
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: cosmicdeploy
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: cosmicdeploy
          image: cosmicdeploy:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PORT
              value: "3000"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
